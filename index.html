<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Radio Dugo</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>

    <!--
      YouTube IFrame Player target — lives outside React so React re-renders
      never destroy the iframe. Positioned to sit exactly over the album-art
      slot in the fixed PlayerBar (88px tall, artwork 56px, centred = 16px gap).
    -->
    <div
      id="yt-player"
      style="
        position: fixed;
        bottom: 16px;
        left: 24px;
        width: 56px;
        height: 56px;
        border-radius: 8px;
        overflow: hidden;
        z-index: 200;
        opacity: 0;
        transition: opacity 0.3s;
        pointer-events: none;
      "
    ></div>

    <!-- YouTube IFrame Player API -->
    <script src="https://www.youtube.com/iframe_api"></script>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
